name: Deploy

on:
  push:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  deploy:
    # self-hosted runner крутится на целевом устройстве (Orange Pi в LAN),
    # поэтому деплой идёт локально — без SSH и без облачного раннера.
    runs-on: [self-hosted, orangepi]
    steps:
      - name: Deploy on Orange Pi
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_PATH }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          cd "$DEPLOY_DIR"
          git config --global --add safe.directory "$DEPLOY_DIR" || true
          git fetch --all
          git checkout "$BRANCH" || git checkout -b "$BRANCH" "origin/$BRANCH"
          git reset --hard "origin/$BRANCH"

          # .env генерируется из секрета BOT_TOKEN (права 600 благодаря umask)
          umask 077
          printf 'BOT_TOKEN=%s\n' "$BOT_TOKEN" > .env

          [ -d .venv ] || python3 -m venv .venv
          .venv/bin/pip install -q --upgrade pip
          .venv/bin/pip install -q -r requirements.txt

          # Перезапуск сервиса (sudo только на restart; статус читается без root)
          sudo -n systemctl restart trainparserbot
          systemctl --no-pager --full status trainparserbot || true
